<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - المعلم</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #f4f6f9; }
        .navbar { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); padding: 15px 0; }
        .navbar-brand { color: white !important; font-weight: bold; }
        .dashboard-header { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); color: white; padding: 40px 0; margin-bottom: 30px; }
        .stats-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 3px 15px rgba(0,0,0,0.1); text-align: center; }
        .stats-number { font-size: 2.5rem; font-weight: bold; color: #2c3e50; }
        .btn-teacher { background: #2c3e50; color: white; padding: 12px 30px; border-radius: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/dashboard/">
            <i class="fas fa-chalkboard-teacher me-2"></i>
            LMS | لوحة المعلم
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" href="/admin/">
                        <i class="fas fa-cog me-1"></i>الإدارة
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/courses/">
                        <i class="fas fa-book-open me-1"></i>الدورات
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/logout/">
                        <i class="fas fa-sign-out-alt me-1"></i>خروج
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="dashboard-header">
    <div class="container">
        <h1>مرحباً أستاذ {{ user.username }}!</h1>
        <p>إحصائيات منصتك التعليمية</p>
    </div>
</div>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="stats-card">
                <i class="fas fa-book fa-3x mb-3" style="color: #2c3e50;"></i>
                <div class="stats-number">{{ total_courses }}</div>
                <div>دورة منشورة</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stats-card">
                <i class="fas fa-users fa-3x mb-3" style="color: #3498db;"></i>
                <div class="stats-number">{{ total_students }}</div>
                <div>تسجيل طالب</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stats-card">
                <i class="fas fa-chart-line fa-3x mb-3" style="color: #27ae60;"></i>
                <div class="stats-number">{{ my_courses }}</div>
                <div>دوراتك</div>
            </div>
        </div>
    </div>

    <div class="stats-card mt-4 text-center">
        <h4>إجراءات سريعة</h4>
        <a href="/admin/courses/course/add/" class="btn btn-teacher me-2">
            <i class="fas fa-plus-circle me-2"></i>إضافة دورة جديدة
        </a>
        <a href="/admin/" class="btn btn-outline-secondary">
            <i class="fas fa-cog me-2"></i>لوحة الإدارة
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
