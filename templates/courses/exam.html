<!DOCTYPE html>
<html>
<head>
    <title>امتحان {{ course.title }}</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 0; }
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .question { background: white; padding: 20px; margin-bottom: 20px; border-radius: 10px; }
        .option { margin: 10px 0; }
        .btn { background: #28a745; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="header">📝 امتحان {{ course.title }}</div>
<div class="container">
    <form method="post">
        {% csrf_token %}
        {% for q in questions %}
            <div class="question">
                <h3>{{ forloop.counter }}. {{ q.text }}</h3>
                <div class="option"><input type="radio" name="q_{{ q.id }}" value="A"> {{ q.option_a }}</div>
                <div class="option"><input type="radio" name="q_{{ q.id }}" value="B"> {{ q.option_b }}</div>
                <div class="option"><input type="radio" name="q_{{ q.id }}" value="C"> {{ q.option_c }}</div>
                <div class="option"><input type="radio" name="q_{{ q.id }}" value="D"> {{ q.option_d }}</div>
            </div>
        {% empty %}
            <p>لا توجد أسئلة بعد.</p>
        {% endfor %}
        {% if questions %}
            <button type="submit" class="btn">📤 إرسال الإجابات</button>
        {% endif %}
    </form>
</div>
</body>
</html>
