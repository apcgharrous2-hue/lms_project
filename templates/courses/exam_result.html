<!DOCTYPE html>
<html>
<head>
    <title>نتيجة الامتحان</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; text-align: center; padding-top: 50px; }
        .result { background: white; display: inline-block; padding: 40px; border-radius: 20px; }
        .score { font-size: 60px; color: #28a745; }
        .btn { background: #2c3e50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
<div class="result">
    <h1>نتيجتك في {{ course.title }}</h1>
    <div class="score">{{ percentage }}%</div>
    <p>الإجابات الصحيحة: {{ score }} / {{ total }}</p>
    <a href="{% url 'courses:course_detail' course.id %}" class="btn">العودة للدورة</a>
</div>
</body>
</html>
